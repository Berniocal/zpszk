<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generátor playlistu</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { 
  font-family: Arial; 
  padding: 15px; 
  display: flex;
  justify-content: center;
  background: #f5f5f5;
}

.container {
  max-width: 600px;
  width: 100%;
  background: white;
  padding: 15px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

table { width: 100%; border-collapse: collapse; }
td, th { border: 1px solid #ccc; padding: 6px; text-align: center; }

input { width: 70px; text-align: center; padding: 4px; }
.name-input { width: 100%; margin-bottom: 10px; padding: 6px; }

button { margin-top: 10px; padding: 12px; width: 100%; font-size: 16px; cursor: pointer; }

  .theme-btn {
  position: fixed;
  top: 10px;
  right: 10px;

  width: 40px;
  height: 40px;

  border-radius: 8px;
  border: none;

  background: #eee;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  font-size: 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

body.dark .theme-btn {
  background: #333;
  color: white;
}

#qrcode { display:flex; justify-content:center; margin-top:10px; }

  

/* DARK MODE */
body.dark { background: #121212; color: white; }
body.dark .container { background: #1e1e1e; }
body.dark table, body.dark td, body.dark th { border-color: #555; }
body.dark input { background: #2a2a2a; color: white; border: 1px solid #555; }
</style>

<style>
:root{
  --bg:#f4f7f5;
  --card:#ffffff;
  --primary:#9aaea3;
  --primary-soft:#e3ebe7;
  --text:#1f2a24;
  --muted:#6b7d73;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  margin:0;
}

.container, .card, .box, .panel{
  background:var(--card);
  border-radius:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  padding:16px;
}

button{
  background:var(--primary);
  color:white;
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-size:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

button:active{
  transform:scale(0.98);
}

input{
  border:none;
  border-radius:12px;
  padding:12px;
  background:var(--primary-soft);
  outline:none;
  font-size:16px;
}

h1,h2,h3{
  font-weight:600;
}


body.dark button{
  background:#2f2f2f;
  color:#ddd;
  box-shadow:none;
}
</style>

</head>

<body>

<button id="themeToggle" class="theme-btn">🌙</button>

<div class="container">

<h2>Generátor playlistu</h2>

<label>Název playlistu:</label>
<input id="playlistName" class="name-input" placeholder="např. nedele">

<table>
<tr><th>#</th><th>ID</th><th>Transp.</th></tr>
<tbody id="tableBody"></tbody>
</table>

<button onclick="generate()">Stáhnout .proscholy</button>
<button onclick="generateQR()">Sdílet přes QR</button>

<input type="file" id="fileInput" accept=".proscholy" style="display:none">
<button onclick="document.getElementById('fileInput').click()">Načíst .proscholy</button>

<div id="qrcode"></div>

</div>

<script>

const BASE64CHARS="ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-_";

function encodeNum(num,length){
  num=Number(num);
  if(!Number.isFinite(num) || num<0) num=0;
  let out="";
  for(let i=0;i<length;i++){
    out=BASE64CHARS[num%64]+out;
    num=Math.floor(num/64);
  }
  return out;
}

function decodeNum(str){
  let n=0;
  for(const ch of str){
    const v=BASE64CHARS.indexOf(ch);
    if(v<0) throw new Error("Neplatný znak v QR datech");
    n=n*64+v;
  }
  return n;
}

function b64UrlEncodeUtf8(text){
  const bytes=new TextEncoder().encode(text);
  let bin="";
  bytes.forEach(b=>bin+=String.fromCharCode(b));
  return btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
}

function b64UrlDecodeUtf8(str){
  str=str.replace(/-/g,"+").replace(/_/g,"/");
  while(str.length%4) str+="=";
  const bin=atob(str);
  const bytes=new Uint8Array([...bin].map(ch=>ch.charCodeAt(0)));
  return new TextDecoder().decode(bytes);
}

function clearPlaylistForm(){
  for(let i=0;i<20;i++){
    document.getElementById(`id_${i}`).value="";
    document.getElementById(`trans_${i}`).value=0;
  }
}

const tbody = document.getElementById("tableBody");

for (let i = 0; i < 20; i++) {
  const row = document.createElement("tr");
  row.innerHTML = `
    <td>${i+1}</td>
    <td><input id="id_${i}" type="number" inputmode="numeric"></td>
    <td><input id="trans_${i}" type="number" inputmode="numeric" value="0"></td>
  `;
  tbody.appendChild(row);
}

function getData(){
  const name = document.getElementById("playlistName").value || "playlist";
  const records=[];
  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=document.getElementById(`trans_${i}`).value.trim();
    if(id!==""){
      records.push({rank:i,song_lyric:{id:parseInt(id),transposition:parseInt(t||0)}});
    }
  }
  return {name,records};
}

function generate(){
  const data=getData();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/octet-stream"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=data.name+".proscholy";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generateQR(){
  const name=document.getElementById("playlistName").value||"playlist";

  let packed="";

  for(let i=0;i<20;i++){
    const id=document.getElementById(`id_${i}`).value.trim();
    const t=parseInt(document.getElementById(`trans_${i}`).value||0,10);

    if(id!==""){
      const idNum=parseInt(id,10);
      if(Number.isFinite(idNum)){
        packed+=encodeNum(idNum,3);
        packed+=encodeNum((Number.isFinite(t)?t:0)+12,1);
      }
    }
  }

  // Jednoznačný nový formát:
  // #p1.<nazev_playlistu_v_base64url>.<písně_po_4_znacích>
  // Díky prefixu p1 si stránka nikdy nesplete název s celou URL.
  const payload="p1."+b64UrlEncodeUtf8(name)+"."+packed;
  const url=location.origin+location.pathname+"#"+payload;

  const div=document.getElementById("qrcode");
  div.innerHTML="";
  QRCode.toCanvas(url,{width:220},(err,canvas)=>{ if(!err) div.appendChild(canvas); });
}

window.onload=()=>{
  if(location.hash.length>1){
    try{
      const hash=location.hash.substring(1);

      clearPlaylistForm();

      // Nový bezpečný formát: #p1.<base64url_nazev>.<kompaktni_data>
      if(hash.startsWith("p1.")){
        const firstDot=hash.indexOf(".",3);
        const namePart=hash.substring(3, firstDot);
        const data=hash.substring(firstDot+1);

        const name=b64UrlDecodeUtf8(namePart);
        document.getElementById("playlistName").value=name||"";

        let pos=0;
        let row=0;

        while(pos+4<=data.length && row<20){
          const id=decodeNum(data.substring(pos,pos+3));
          const t=decodeNum(data.substring(pos+3,pos+4))-12;

          document.getElementById(`id_${row}`).value=id;
          document.getElementById(`trans_${row}`).value=t;

          pos+=4;
          row++;
        }

        setTimeout(()=>{
          if(confirm("Chcete stáhnout playlist '"+name+"'?")){
            generate();
          }
        },300);

        return;
      }

      // Zpětná kompatibilita se starým formátem: #nazev|123,0;456,-2
      const decoded=decodeURIComponent(hash);
      const pipeIndex=decoded.indexOf("|");

      if(pipeIndex>=0){
        const name=decoded.substring(0,pipeIndex);
        const data=decoded.substring(pipeIndex+1);

        document.getElementById("playlistName").value=name||"";

        if(data){
          const items=data.split(";");
          items.forEach((item,i)=>{
            if(i>=20) return;
            const [id,t]=item.split(",");
            if(id){
              document.getElementById(`id_${i}`).value=id;
              document.getElementById(`trans_${i}`).value=t||0;
            }
          });
        }

        setTimeout(()=>{
          if(confirm("Chcete stáhnout playlist '"+name+"'?")){
            generate();
          }
        },300);
      }

    }catch(e){
      console.log("QR chyba", e);
    }
  }
};

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);

      for(let i=0;i<20;i++){
        document.getElementById(`id_${i}`).value="";
        document.getElementById(`trans_${i}`).value=0;
      }

      document.getElementById("playlistName").value=data.name||"";

      data.records.forEach(r=>{
        const i=r.rank;
        if(i<20){
          document.getElementById(`id_${i}`).value=r.song_lyric.id;
          document.getElementById(`trans_${i}`).value=r.song_lyric.transposition ?? 0;
        }
      });

      generateQR();

    }catch(err){
      alert("Nepodařilo se načíst soubor");
    }
  };
  reader.readAsText(file);
});

const toggle = document.getElementById("themeToggle");

if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark ? "dark" : "light");
  toggle.textContent = isDark ? "☀️" : "🌙";
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js');
}
</script>
<div id="installModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99999;align-items:center;justify-content:center;font-family:system-ui,sans-serif;">
  <div style="max-width:420px;width:90%;background:white;color:#111;border-radius:20px;padding:22px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4);">
    <h2 style="margin-top:0;">Nainstalovat aplikaci?</h2>

    <p style="line-height:1.5;">
      Tuto aplikaci si můžete přidat na plochu telefonu.
      Bude se pak otevírat jako běžná aplikace.
    </p>

    <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px;">
      <button id="installNow" style="padding:13px;border:none;border-radius:12px;background:#22c55e;color:white;font-weight:700;font-size:1rem;">
        Instalovat aplikaci
      </button>

      <button id="installLater" style="padding:12px;border:none;border-radius:12px;background:#e5e7eb;color:#111;">
        Později
      </button>

      <button id="installNever" style="padding:12px;border:none;border-radius:12px;background:#fee2e2;color:#7f1d1d;">
        Neptat se znovu
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const NEVER_KEY = "pwa_install_never_ask";
  const LATER_KEY = "pwa_install_later_until";

  let deferredInstallPrompt = null;

  function isStandalone(){
    return window.matchMedia("(display-mode: standalone)").matches ||
           window.navigator.standalone === true;
  }

  function showInstallModal(){
    if (isStandalone()) return;
    if (localStorage.getItem(NEVER_KEY) === "1") return;

    const laterUntil = Number(localStorage.getItem(LATER_KEY) || 0);
    if (Date.now() < laterUntil) return;

    const modal = document.getElementById("installModal");
    if (modal) modal.style.display = "flex";
  }

  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    deferredInstallPrompt = e;

    setTimeout(showInstallModal, 1500);
  });

  document.addEventListener("DOMContentLoaded", function(){
    const installNow = document.getElementById("installNow");
    const installLater = document.getElementById("installLater");
    const installNever = document.getElementById("installNever");
    const modal = document.getElementById("installModal");

    if (!installNow || !installLater || !installNever || !modal) return;

    installNow.onclick = async function(){
      modal.style.display = "none";

      if (deferredInstallPrompt) {
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
      } else {
        alert("Pokud se instalace nespustila, klikněte vpravo nahoře na tři tečky a zvolte „Instalovat aplikaci“ nebo „Přidat na plochu“.");
      }
    };

    installLater.onclick = function(){
      localStorage.setItem(LATER_KEY, Date.now() + 3*24*60*60*1000);
      modal.style.display = "none";
    };

    installNever.onclick = function(){
      localStorage.setItem(NEVER_KEY, "1");
      modal.style.display = "none";
    };
  });
})();
</script>
</body>
</html>
